name: daily_app
description: 매일 습관 추적 & 일과 기록 앱
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Database (Local Storage)
  drift: ^2.28.2
  drift_sqflite: ^2.0.1
  sqlite3_flutter_libs: ^0.6.0+eol
  path_provider: ^2.1.5
  path: ^1.9.1

  # Navigation
  go_router: ^17.1.0

  # Calendar
  table_calendar: ^3.2.0

  # Charts
  fl_chart: ^1.1.1

  # Date/Locale
  intl: ^0.20.2

  # UI Utilities
  flutter_slidable: ^4.0.3
  gap: ^3.0.1
  flutter_animate: ^4.5.2
  collection: ^1.19.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # Code Generation
  build_runner: ^2.5.4
  drift_dev: ^2.28.0
  riverpod_generator: ^2.6.5
  riverpod_lint: ^2.6.5
  custom_lint: ^0.7.6

  # Testing
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
